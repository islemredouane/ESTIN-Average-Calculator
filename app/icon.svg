<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient border: violet → pink → deep purple -->
    <linearGradient id="bd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="50%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <!-- Inner background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1040"/>
      <stop offset="60%"  stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <!-- Sigma stroke gradient -->
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <!-- Glow on the Sigma -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft outer halo on hexagon -->
    <filter id="halo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer halo (subtle purple bloom) -->
  <polygon
    points="50,4 90,27 90,73 50,96 10,73 10,27"
    fill="none"
    stroke="#7c3aed"
    stroke-width="2"
    opacity="0.35"
    filter="url(#halo)"
  />

  <!-- Hexagon border layer -->
  <polygon
    points="50,4 90,27 90,73 50,96 10,73 10,27"
    fill="url(#bd)"
  />

  <!-- Hexagon dark interior -->
  <polygon
    points="50,7.5 87,28.75 87,71.25 50,92.5 13,71.25 13,28.75"
    fill="url(#bg)"
  />

  <!--
    Sigma (Σ) — mathematical summation / average
    top-right → top-left → right-apex → bottom-left → bottom-right
  -->
  <polyline
    points="69,24 29,24 62,50 29,76 69,76"
    fill="none"
    stroke="url(#sg)"
    stroke-width="7.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
</svg>
